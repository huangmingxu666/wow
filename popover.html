<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FU角色卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .header h2 { color: #f0c060; font-size: 16px; }
    .btn-import {
      background: #2d7d46;
      color: #fff;
      border: none;
      padding: 4px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-import:hover { background: #3da05a; }
    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .list-item {
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
      font-size: 13px;
      color: #ddd;
    }
    .list-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: #3a3a5a;
    }
    .list-item .id { color: #666; font-size: 11px; margin-left: 8px; }
    .empty { color: #666; text-align: center; padding: 40px 0; font-size: 14px; }
    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a44;
      font-size: 11px;
      color: #666;
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>📋 FU角色卡</h2>
    <button class="btn-import" id="importBtn">📄 导入Excel</button>
  </div>
  <div class="list" id="cardList">
    <div class="empty">暂无角色卡<br>点击"导入Excel"上传</div>
  </div>
  <div class="footer" id="statusBar">就绪</div>
  <script src="popover.js"></script>
</body>
</html>
